# ============================================================================
# MkDocs configuration for DESIGN4ᴾᴿᴼ OpenCart Language Packs Documentation
# ============================================================================

# Site information
site_name: "DESIGN4ᴾᴿᴼ OpenCart"
site_url: "https://design4pro.github.io/opencart-community/"
site_description: >
  Official documentation for OpenCart language packs by DESIGN4ᴾᴿᴼ.
  Install, configure, and translate your OpenCart store.
site_author: "DESIGN4ᴾᴿᴼ"

# Repository
repo_name: design4pro/opencart-community
repo_url: https://github.com/design4pro/opencart-community
edit_uri: https://github.com/design4pro/opencart-community/edit/main/docs/

# Copyright
copyright: "Copyright &copy; 2026 DESIGN4ᴾᴿᴼ. All rights reserved."

# Configuration
theme:
  name: material
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode

# Extra settings
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/design4pro/opencart-community
    - icon: fontawesome/brands/opencart
      link: https://www.opencart.com/index.php?route=marketplace/extension/info&extension_id=

# Plugins
plugins:
  - search:
      lang: en

# Markdown extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: design4pro
      repo: opencart-community
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Navigation
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Configuration: getting-started/configuration.md
      - Activation: getting-started/activation.md
  - Extensions:
      - Polish: extensions/polish.md
      - Lithuanian: extensions/lithuanian.md
  - FAQ: faq/index.md
  - Troubleshooting: troubleshooting/index.md
  - Support: support/index.md

# Build directory
docs_dir: docs
site_dir: site
