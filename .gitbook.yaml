# GitBook Configuration
# https://docs.gitbook.com

root: ./
structure:
  readmeTitle: README
  summaryTitle: Summary

# Page tree configuration
reading:
  # Show "Edit this page" links
  showEditLink: true
  showOutline: true
  # Navigation style
  navigation:
    - title: Getting Started
      path: /getting-started
    - title: Extensions
      path: /extensions
    - title: Development
      path: /development

# Search configuration
search:
  # Ignore certain files from search
  ignore:
    - CHANGELOG.md

# Analytics (optional - disabled by default)
# analytics:
#   provider: google
#   trackingId: UA-XXXXXXXXX-X

# Logo configuration
logo: ./assets/logo-light.png
logoDark: ./assets/logo-dark.png

# Favicon
favicon: ./assets/favicon.svg

# Open Graph / Social metadata
meta:
  # Site name (appears in search results)
  siteName: DESIGN4PRO OpenCart Extensions
  # Title separator
  titleSeparator: "|"

# GitHub integration
github:
  repository: https://github.com/design4pro/opencart-community
  branch: main
  # Enable "Edit this page" links
  editLink: true

# Custom JS/CSS (optional)
# scripts:
#   - ./assets/custom.js
# styles:
#   - ./assets/custom.css
