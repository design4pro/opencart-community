# GitBook Variables Configuration
# https://docs.gitbook.com/configuration/variables

# Project information
project:
  name: "DESIGN4PRO OpenCart Extensions"
  description: "Professional extensions and language packages for OpenCart e-commerce platform"
  version: "4.1.x"
  url: "https://opencart.design4.pro"

# Company information
company:
  name: "DESIGN4PRO"
  email: "dev@design4.pro"
  website: "https://design4.pro"
  github: "https://github.com/design4pro"

# Support
support:
  email: "dev@design4.pro"
  github: "https://github.com/design4pro/opencart-community"
  discussions: "https://github.com/design4pro/opencart-community/discussions"

# Extension information
extensions:
  language:
    - id: "oc_language_pl"
      name: "Polish Language Pack"
      status: "active"
    - id: "oc_language_uk"
      name: "Ukrainian Language Pack"
      status: "planned"
  theme:
    - id: "theme_default"
      name: "Default Theme"
      status: "planned"

# OpenCart version
opencart:
  supported_versions:
    - "4.1.0.3"
    - "4.1.0.2"
    - "4.1.0.1"
    - "4.1.0.0"
  recommended_version: "4.1.0.3"

# Download links
downloads:
  marketplace: "https://www.opencart.com/index.php?route=marketplace/extension/info&extension_id=48243"
